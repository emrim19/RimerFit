<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162040;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Dumbbell shape centered -->
  <!-- Left plate -->
  <rect x="3" y="12" width="4" height="8" rx="1.5" fill="url(#accentGrad)"/>
  <!-- Left collar -->
  <rect x="7" y="13.5" width="2" height="5" rx="1" fill="#60a5fa"/>
  <!-- Bar -->
  <rect x="9" y="14.5" width="14" height="3" rx="1.5" fill="#60a5fa"/>
  <!-- Right collar -->
  <rect x="23" y="13.5" width="2" height="5" rx="1" fill="#60a5fa"/>
  <!-- Right plate -->
  <rect x="25" y="12" width="4" height="8" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Small upward tick / PR arrow above bar -->
  <polyline points="14,10 16,7 18,10" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
